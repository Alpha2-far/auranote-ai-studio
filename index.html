<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuraNote AI Studio - Second Cerveau Intelligent</title>
  <meta name="description" content="Carnet de réflexions intelligent pour centraliser, organiser et retrouver vos échanges avec les IA (Gemini, Claude, ChatGPT).">

  <!-- PWA & Favicon Metadata -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <meta name="theme-color" content="#0D0F12">

  <!-- CSS Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auras.css">
  <link rel="stylesheet" href="css/zen-editor.css">
</head>
<body>
  <!-- Application Header -->
  <div id="header-app"></div>

  <!-- Main Layout -->
  <main class="main-layout">
    <!-- Sidebar: Search, Filters & Note List -->
    <aside class="sidebar">
      <div id="sidebar-filters" class="sidebar-header"></div>
      <div id="sidebar-list" style="flex: 1; overflow-y: auto;"></div>
    </aside>

    <!-- Main Content: Zen Reader & Editor -->
    <section id="main-editor" style="display: flex; flex-direction: column; flex: 1;"></section>
  </main>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- JavaScript Entry Point -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA ServiceWorker actif :', reg.scope))
          .catch(err => console.warn('PWA ServiceWorker échec :', err));
      });
    }
  </script>
</body>
</html>
