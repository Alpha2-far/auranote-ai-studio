<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>AuraNote Capture</title>
  <style>
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0D0F12;
      color: #F4EFE6;
      margin: 0;
      padding: 16px;
      box-sizing: border-box;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      border-bottom: 1px solid rgba(226, 184, 114, 0.2);
      padding-bottom: 10px;
    }
    .header h2 {
      font-size: 16px;
      margin: 0;
      color: #E2B872;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #E2B872 0%, #C49A54 100%);
      color: #0D0F12;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #94A3B8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 512 512" fill="none">
      <rect width="512" height="512" rx="115" fill="#0D0F12"/>
      <circle cx="256" cy="256" r="165" fill="none" stroke="#E2B872" stroke-width="20"/>
      <path d="M 160 360 L 256 140 L 352 360 M 195 280 H 317" stroke="#F4EFE6" stroke-width="24"/>
      <circle cx="362" cy="152" r="20" fill="#E2B872"/>
    </svg>
    <h2>AuraNote Capture</h2>
  </div>
  <p style="font-size: 13px; line-height: 1.4; color: #CBD5E1; margin-bottom: 12px;">
    Envoyez la réponse de l'IA affichée à l'écran directement dans votre carnet.
  </p>
  <button id="capture-btn" class="btn">⚡ Capturer la Réponse IA</button>
  <div id="status-msg" class="status">Prêt</div>

  <script src="popup.js"></script>
</body>
</html>
